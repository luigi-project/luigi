name: Coverage report for container

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  upload:
    name: Code coverage artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'

      - name: Build Luigi Client
        run: cd ./client && npm ci && npm run bundle

      - name: Run unit tests
        run: cd ./container && npm ci && npm run test

      - name: Run e2e tests
        run: bash ./container/run-container-e2e.sh coverage || exit 1

      - name: Generate coverage summary
        run: cd ./container && npm run coverage-summary

      - name: Upload coverage summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: ./container/coverage-summary/index.html
          name: coverage-summary
          retention-days: 7
          overwrite: true